rangerConfig:
  rangerAdminUrl: "http://localhost:6080"
  username: "admin"
  password: "rangerR0cks!"

awsConfig:
  region: "us-west-2"
  catalogId: "427250191192"
  # Note: run with AWS_PROFILE=hocanint+ranger-test1 so the sync service can call Glue/LF in account 427250191192

principalMapping:
  userMappings:
    "analyst": "arn:aws:iam::427250191192:role/ranger-sim-analyst"
    "etl_user": "arn:aws:iam::427250191192:role/ranger-sim-etl_user"
    "data_admin": "arn:aws:iam::427250191192:role/ranger-sim-data_admin"
    "viewer": "arn:aws:iam::427250191192:role/ranger-sim-viewer"
  groupMappings:
    "analyst": "arn:aws:iam::427250191192:role/ranger-sim-analyst"
    "etl_user": "arn:aws:iam::427250191192:role/ranger-sim-etl_user"
    "data_admin": "arn:aws:iam::427250191192:role/ranger-sim-data_admin"
    "viewer": "arn:aws:iam::427250191192:role/ranger-sim-viewer"
  roleMappings:
    "analyst": "arn:aws:iam::427250191192:role/ranger-sim-analyst"
    "etl_user": "arn:aws:iam::427250191192:role/ranger-sim-etl_user"
    "data_admin": "arn:aws:iam::427250191192:role/ranger-sim-data_admin"
    "viewer": "arn:aws:iam::427250191192:role/ranger-sim-viewer"

policyRefreshIntervalMs: 15000

wildcardRefreshIntervalSeconds: 0

maxLfRetries: 3
lfRetryBackoffMs: 1000

deadLetterLogPath: "/tmp/ranger-sim/dead-letter.jsonl"
checkpointPath: "/tmp/ranger-sim/sync-checkpoint.json"

# Multi-service mode via lightweight direct-REST fetch (Option A).
# useRestPolicyFetch=true makes the sync service fetch policies for EACH listed
# service instance via the Ranger Admin REST API and merge them, instead of
# standing up a per-service PolicyRefresher plugin. This exercises the full
# Ranger -> Cedar -> LF translation path for every source service type, not
# just lakeformation.
useRestPolicyFetch: true
rangerServices:
  - serviceType: "lakeformation"
    serviceInstanceName: "lakeformation"
  - serviceType: "hive"
    serviceInstanceName: "hive"
  - serviceType: "trino"
    serviceInstanceName: "trino"
    # Trino policies are only processed when their catalog matches this name.
    # The simulator's Trino generator authors policies under catalog "hive".
    gdcCatalogName: "hive"
  - serviceType: "amazon-emr-emrfs"
    serviceInstanceName: "amazon-emr-emrfs"
  - serviceType: "amazon-emr-spark"
    serviceInstanceName: "amazon-emr-spark"

server:
  shutdownTimeoutSeconds: 30
  logLevel: INFO
  metricsNamespace: RangerSimTest
  statusPort: 18080

reverseSync:
  enabled: false

tagSync:
  enabled: false
