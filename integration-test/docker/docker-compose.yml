name: ranger-lf-it

services:
  ranger-db:
    image: apache/ranger-db:${RANGER_VERSION:-2.4.0}
    environment:
      POSTGRES_PASSWORD: "rangerR0cks!"
      RANGER_DB_USER: rangeradmin
      RANGER_DB_PASSWORD: "rangerR0cks!"
    networks:
      - rangernw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rangeradmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ranger-solr:
    image: apache/ranger-solr:${RANGER_VERSION:-2.4.0}
    ports:
      - "8983:8983"
    networks:
      - rangernw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/cores?action=STATUS || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ranger-admin:
    image: apache/ranger:${RANGER_VERSION:-2.4.0}
    ports:
      - "6080:6080"
    depends_on:
      ranger-db:
        condition: service_healthy
      ranger-solr:
        condition: service_healthy
    networks:
      - rangernw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6080/login.jsp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  conversion-server:
    image: ranger-lf-it:local
    depends_on:
      ranger-admin:
        condition: service_healthy
    environment:
      DRY_RUN_ENABLED: "true"
      DRY_RUN_OUTPUT_DIR: /app/dry-run-output
    volumes:
      - ./dry-run-output:/app/dry-run-output
      - ./server-config-it.yaml:/app/config-it.yaml:ro
      - ./ranger-lakeformation-security-it.xml:/app/ranger-lakeformation-security.xml:ro
    networks:
      - rangernw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'java.*app.jar' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    entrypoint: ["java", "-cp", "/app/app.jar:/app", "com.amazonaws.policyconverters.app.ConversionServerMain", "/app/config-it.yaml"]

networks:
  rangernw:
    driver: bridge
